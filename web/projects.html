<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Mirotic — Projects</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 system-ui, -apple-system, "SF Pro", sans-serif; background: #0b0b0c; color: #e8e8e8; }
  header { padding: 12px 20px; border-bottom: 1px solid #1c1c1f; display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 16px; margin: 0; font-weight: 500; letter-spacing: 0.02em; }
  header .nav { color: #7ba8e0; font-size: 13px; text-decoration: none; padding: 5px 12px; border-radius: 5px; background: #1c1c1f; border: 1px solid #2a2a2e; }
  header .nav.active { background: #1f4d39; border-color: #2d6e54; color: #a3d9a5; }
  header .nav:hover { background: #22222a; }
  header .nav.active:hover { background: #2a6347; }
  header .meta { color: #555; font-size: 11px; font-variant-numeric: tabular-nums; display: inline-flex; align-items: center; gap: 6px; }
  header .meta::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: #2d6e54; box-shadow: 0 0 6px rgba(45,110,84,0.5); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  main { padding: 20px; }

  /* Project tiles */
  .tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .tile { background: #111114; border: 1px solid #2a2a2e; border-radius: 8px; padding: 14px 16px; cursor: pointer; transition: background 0.1s; }
  .tile:hover { background: #17171b; border-color: #3a3a40; }
  .tile h3 { margin: 0; font-size: 15px; font-weight: 500; }
  .tile .sub { color: #888; font-size: 11px; margin-top: 2px; font-style: italic; }
  .tile .desc { margin-top: 8px; font-size: 12px; color: #a0a0a0; line-height: 1.4; max-height: 4em; overflow: hidden; }
  .tile .footer { margin-top: 10px; display: flex; gap: 12px; font-size: 11px; color: #666; }
  .tile .footer a { color: #7ba8e0; text-decoration: none; }

  /* Detail: issue board */
  .board { display: grid; grid-template-columns: repeat(6, minmax(200px, 1fr)); gap: 12px; height: calc(100vh - 160px); overflow-x: auto; }
  .col { background: #111114; border: 1px solid #1c1c1f; border-radius: 8px; display: flex; flex-direction: column; min-height: 0; }
  .col h2 { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin: 0; padding: 10px 12px; border-bottom: 1px solid #1c1c1f; display: flex; justify-content: space-between; }
  .col h2 .count { color: #555; }
  .col .cards { padding: 8px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card { background: #1a1a1e; border: 1px solid #2a2a2e; border-radius: 6px; padding: 10px 12px; cursor: pointer; transition: background 0.1s; }
  .card:hover { background: #22222a; border-color: #3a3a40; }
  .card .title { font-weight: 500; font-size: 13px; line-height: 1.35; margin-bottom: 2px; word-break: break-word; }
  .card .title-vi { font-size: 11px; color: #888; line-height: 1.3; margin-bottom: 4px; font-style: italic; word-break: break-word; }
  .card .meta { font-size: 11px; color: #777; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .card .type { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 500; }
  .card .type.feature { background: #1f3d4d; color: #7bd0e0; }
  .card .type.bug { background: #4d1f1f; color: #e07b7b; }
  .card .type.chore { background: #3d3d1f; color: #d0d07b; }
  .card .type.spike { background: #3d1f4d; color: #d07be0; }
  .card .type.adr { background: #4d3d1f; color: #e0b87b; }
  .card .prio { font-size: 10px; color: #666; }
  .card .prio.p0 { color: #e07b7b; font-weight: 500; }
  .card .prio.p1 { color: #e0d47b; }
  .card .desc { color: #888; font-size: 11px; margin-top: 4px; line-height: 1.4; max-height: 3.5em; overflow: hidden; }
  .empty { color: #444; font-size: 11px; padding: 12px; text-align: center; }

  .col-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .col-header .info { }
  .col-header .info h2 { margin: 0; font-size: 20px; font-weight: 500; }
  .col-header .info .sub { color: #888; font-size: 12px; margin-top: 2px; }
  .col-header .info .sub a { color: #7ba8e0; text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1>Mirotic</h1>
  <a href="/ideas" class="nav">Ideas</a>
  <a href="/projects" class="nav active">Projects</a>
  <span style="flex:1"></span>
  <span class="meta" id="meta" title="loading…">—</span>
</header>

<main id="main"></main>

<script>
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
}

async function renderList() {
  const projects = await fetch("/api/projects").then(r => r.json());
  document.getElementById("meta").textContent = `${projects.length} projects`;
  const main = document.getElementById("main");
  if (projects.length === 0) {
    main.innerHTML = `<div style="color:#666;text-align:center;padding:60px">
      <div style="font-size:16px;margin-bottom:8px">Chưa có project nào</div>
      <div style="font-size:12px">Vào <a href="/ideas" style="color:#7ba8e0">Ideas</a> → chọn card <b>deployed</b> → click <b>Ship to Project</b></div>
    </div>`;
    return;
  }
  main.innerHTML = `<div class="tiles">${projects.map(p => `<div class="tile" onclick="location.href='/projects/${escapeHtml(p.id)}'">
    <h3>${escapeHtml(p.title)}</h3>
    ${p.title_vi && p.title_vi !== p.title ? `<div class="sub">${escapeHtml(p.title_vi)}</div>` : ""}
    <div class="desc">${escapeHtml(p.description || "—")}</div>
    <div class="footer">
      ${p.repo_url ? `<a href="${escapeHtml(p.repo_url)}" target="_blank" onclick="event.stopPropagation()">repo↗</a>` : ""}
      ${p.prod_domain ? `<a href="https://${escapeHtml(p.prod_domain)}" target="_blank" onclick="event.stopPropagation()">${escapeHtml(p.prod_domain)}↗</a>` : ""}
      <span>${escapeHtml(p.status)}</span>
    </div>
  </div>`).join("")}</div>`;
}

const ISSUE_COLS = [
  ["backlog", "Backlog"],
  ["ready", "Ready"],
  ["in_progress", "In progress"],
  ["review", "Review"],
  ["shipped", "Shipped"],
  ["dropped", "Dropped"],
];

async function renderDetail(id) {
  const p = await fetch(`/api/projects/${encodeURIComponent(id)}`).then(r => r.json());
  document.getElementById("meta").textContent = `${p.issues?.length ?? 0} issues`;
  const main = document.getElementById("main");
  const issues = p.issues || [];
  main.innerHTML = `
    <div class="col-header">
      <div class="info">
        <h2>${escapeHtml(p.title)}</h2>
        <div class="sub">
          ${p.title_vi && p.title_vi !== p.title ? `<span style="font-style:italic">${escapeHtml(p.title_vi)}</span> · ` : ""}
          ${p.repo_url ? `<a href="${escapeHtml(p.repo_url)}" target="_blank">repo↗</a> · ` : ""}
          ${p.prod_domain ? `<a href="https://${escapeHtml(p.prod_domain)}" target="_blank">prod↗</a> · ` : ""}
          ${p.staging_domain ? `<a href="https://${escapeHtml(p.staging_domain)}" target="_blank">staging↗</a> · ` : ""}
          status ${escapeHtml(p.status)}
        </div>
      </div>
    </div>
    <div class="board">
      ${ISSUE_COLS.map(([key, label]) => {
        const items = issues.filter(i => i.status === key);
        return `<div class="col">
          <h2>${label}<span class="count">${items.length}</span></h2>
          <div class="cards">${items.length === 0 ? `<div class="empty">—</div>` :
            items.map(i => `<div class="card">
              <div class="title">${escapeHtml(i.title)}</div>
              ${i.title_vi && i.title_vi !== i.title ? `<div class="title-vi">${escapeHtml(i.title_vi)}</div>` : ""}
              <div class="meta">
                <span class="type ${escapeHtml(i.type)}">${escapeHtml(i.type)}</span>
                <span class="prio ${escapeHtml(i.priority)}">${escapeHtml(i.priority)}</span>
                ${i.ceo_rating ? `<span style="color:#e0d47b">${"★".repeat(i.ceo_rating)}</span>` : ""}
              </div>
              ${i.description ? `<div class="desc">${escapeHtml(i.description.slice(0, 200))}</div>` : ""}
            </div>`).join("")}
          </div>
        </div>`;
      }).join("")}
    </div>`;
}

const m = location.pathname.match(/^\/projects\/(.+)$/);
if (m) renderDetail(decodeURIComponent(m[1]));
else renderList();
</script>
</body>
</html>
