# dashboard.compose.yml — chạy dashboard (mode=serve) trên EC2.
# Đọc DATABASE_URL local (postgres cùng host). Caddy reverse-proxy kanban.luunguyen.dev → :4321.
services:
  dashboard:
    build: .
    image: daily-loop
    container_name: daily-loop-dashboard
    restart: unless-stopped
    network_mode: host                          # truy cập postgres :5432 ở localhost
    env_file:
      - .env.dashboard
    command: ["bun", "run", "daily-loop.ts", "serve"]
    volumes:
      - ./data:/app/data                        # chỉ cần đọc/ghi outbox, không phải build/
